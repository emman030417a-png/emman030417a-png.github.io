<!DOCTYPE html>
<html>
<head>
  <title>Photo Gallery</title>
  <style>
    body {
      background-color: #f0f2f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 50px;
    }
    
    h1 {
      color: #333;
    }

    /* This styles our links to look like cool buttons */
    .name-button {
      display: inline-block;
      background-color: #0084ff;
      color: white;
      padding: 15px 30px;
      margin: 10px;
      text-decoration: none; /* Removes the default blue underline */
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      transition: 0.3s; /* Makes the hover effect smooth */
    }

    /* This changes the button color slightly when you hover over it */
    .name-button:hover {
      background-color: #006bce;
    }
  </style>
</head>
<body>

  <h1>My Friends Gallery</h1>
  <p>Select a name below to see their photos!</p>

  <a href="emman.html" class="name-button">Emman</a>
  <a href="juan.html" class="name-button">Juan</a>
  <a href="maria.html" class="name-button">Maria</a>

</body>
</html>
